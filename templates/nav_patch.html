{# Replace the nav_links loop in templates/partials/nav.html with this version #}
{% for link in nav_links %}
  <li class="nav-item">
    {% if link.external %}
      <a class="nav-link" href="{{ link.url }}" target="_blank" rel="noopener noreferrer">
        {{ link.name }} <i class="bi bi-box-arrow-up-right ms-1 small"></i>
      </a>
    {% else %}
      <a class="nav-link {% if request.endpoint == link.endpoint %}active{% endif %}" href="{{ url_for(link.endpoint) }}">{{ link.name }}</a>
    {% endif %}
  </li>
{% endfor %}
